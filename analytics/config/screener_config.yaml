lookback_days: 60
min_price: 500.0
max_price: 2750.0
move_threshold: 1.5                # % absolute move required for today's screening
move_variance: 3.0                 # % historical average reversal threshold (extension - close)
rsi_period: 14
bollinger_period: 20
bollinger_stddev: 2.0
atr_period: 14
atr_multiplier: 1.5
min_risk_reward: 0.1
intraday_interval: "5m"
snapshot_output_dir: "../output/runs"
